    - data:
        code: "import json\nfrom typing import Any, List\n\n\ndef _to_text(value:\
          \ Any) -> str:\n    if value is None:\n        return \"\"\n    if isinstance(value,\
          \ str):\n        return value.strip()\n    return json.dumps(value, ensure_ascii=False)\n\
          \n\ndef _normalize_items(raw: Any) -> List[dict]:\n    if raw is None:\n\
          \        return []\n\n    if isinstance(raw, str):\n        text = raw.strip()\n\
          \        if not text:\n            return []\n        try:\n           \
          \ parsed = json.loads(text)\n            if isinstance(parsed, list):\n\
          \                return [x for x in parsed if isinstance(x, dict)]\n   \
          \         return []\n        except Exception:\n            return []\n\n\
          \    if isinstance(raw, list):\n        return [x for x in raw if isinstance(x,\
          \ dict)]\n\n    return []\n\n\ndef main(arg1=None, **kwargs):\n    items\
          \ = _normalize_items(arg1)\n\n    blocks = []\n    seen = set()\n\n    for\
          \ item in items[:5]:\n        content = _to_text(item.get(\"content\"))\n\
          \n        if not content:\n            continue\n\n        key = content\n\
          \        if key in seen:\n            continue\n        seen.add(key)\n\n\
          \        blocks.append(content)\n\n    kb_text = \"\\n\\n\".join(blocks).strip()\n\
          \n    if not kb_text:\n        kb_text = \"知识库未提供有效内容\"\n\n    return {\n\
          \        \"kb_text\": kb_text\n    }\n"
