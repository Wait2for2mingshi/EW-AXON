            图片说明：

            - files[0] 是无料基准图。

            - files[1] 是正常有料基准图。

            - files[2] 是吸嘴取料失败后的实时图。


            判断步骤：

            1. 确认三图为同一目标区域、同一视角。

            2. 只看图片上半部黑色U型槽、中央长条槽位和槽位附近。

            3. 若实时图只见固定亮块、方形/圆角方形亮块、块状亮区、短块、局部亮斑或背景反光，输出 skip_slot；不要因为这些亮块位于槽内或像遮挡就判为物料。

            4. 若实时图未见连续长条物料，或未见较长连续下边缘直线，输出 skip_slot；方形/圆角方形亮块、块状亮区、短边缘或局部遮挡不能当成物料。

            5. 若实时图与正常有料基准高度一致，物料完整横向落位，左右端部、主体覆盖范围和较长连续下边缘都接近正常基准，输出 retry。

            6. 若实时图有连续长条物料，且至少可见较长连续下边缘直线，但斜向、过曝、边缘伸入、半露出、偏移、卡边、跨出槽位、压入/压住左侧U型圆头，或整体不像正常有料基准，输出
            shake_then_retry。

            7. 只有看不清、无法对齐或无法判断时，输出 no_action。


            只输出 decision 和 reason 两个字段的 JSON。'
