    - data:
        code: "import json\nimport re\n\nALLOWED = {\"skip_slot\", \"retry\", \"shake_then_retry\"\
          , \"no_action\"}\n\ndef strip_think(text):\n    text = str(text or \"\"\
          )\n    text = re.sub(r\"<\\s*think\\b[^>]*>.*?</\\s*think\\s*>\", \"\",\
          \ text, flags=re.I | re.S)\n    text = re.sub(r\"<\\s*think\\b[^>]*>.*$\"\
          , \"\", text, flags=re.I | re.S)\n    return text.strip()\n\ndef extract_json(text):\n\
          \    text = text.strip()\n\n    fence = re.match(r\"^```(?:json)?\\s*([\\\
          s\\S]*?)\\s*```$\", text, flags=re.I)\n    if fence:\n        text = fence.group(1).strip()\n\
          \n    try:\n        return json.loads(text)\n    except Exception:\n   \
          \     pass\n\n    start = text.find(\"{\")\n    end = text.rfind(\"}\")\n\
          \    if start >= 0 and end > start:\n        return json.loads(text[start:end\
          \ + 1])\n\n    return {}\n\ndef main(arg1=None):\n    raw_text = strip_think(arg1)\n\
          \n    try:\n        obj = extract_json(raw_text)\n    except Exception:\n\
          \        obj = {}\n\n    decision = str(obj.get(\"decision\") or \"\").strip()\n\
          \    reason = str(obj.get(\"reason\") or \"\").strip()\n\n    if decision\
