<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f8ff"/>
      <stop offset="100%" stop-color="#edf3ff"/>
    </linearGradient>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf2ff"/>
      <stop offset="100%" stop-color="#dce8ff"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfbf4"/>
      <stop offset="100%" stop-color="#dbf6ea"/>
    </linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e9"/>
      <stop offset="100%" stop-color="#ffefcf"/>
    </linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f2ff"/>
      <stop offset="100%" stop-color="#e4e6ff"/>
    </linearGradient>
    <linearGradient id="c5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f1"/>
      <stop offset="100%" stop-color="#ffe4e4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#263550" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#3f4f6a"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 44px; font-weight: 800; fill: #16253a; }
      .sub { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 21px; font-weight: 500; fill: #4a5d79; }
      .t1 { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 34px; font-weight: 800; fill: #13243a; }
      .t2 { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 22px; font-weight: 600; fill: #324760; }
      .chip { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 20px; font-weight: 600; fill: #24354d; }
      .tag { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 24px; font-weight: 700; fill: #2a3f5d; }
      .code { font-family: "Consolas", "Microsoft YaHei", monospace; font-size: 18px; font-weight: 600; fill: #2d4060; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="86" class="title" text-anchor="middle">AI 文档思维导图能力示意</text>
  <text x="800" y="126" class="sub" text-anchor="middle">文档接入 → 智能解析 → 结构整理 → 画面生成 → 现场使用</text>

  <rect x="60" y="210" width="270" height="360" rx="28" fill="url(#c1)" stroke="#8db2ea" stroke-width="3" filter="url(#shadow)"/>
  <rect x="370" y="210" width="270" height="360" rx="28" fill="url(#c2)" stroke="#58bc8a" stroke-width="3" filter="url(#shadow)"/>
  <rect x="680" y="210" width="270" height="360" rx="28" fill="url(#c3)" stroke="#e1b24b" stroke-width="3" filter="url(#shadow)"/>
  <rect x="990" y="210" width="270" height="360" rx="28" fill="url(#c4)" stroke="#8a91e7" stroke-width="3" filter="url(#shadow)"/>
  <rect x="1300" y="210" width="240" height="360" rx="28" fill="url(#c5)" stroke="#ed8b8b" stroke-width="3" filter="url(#shadow)"/>

  <circle cx="195" cy="270" r="30" fill="#fff" stroke="#7fa6df" stroke-width="3"/>
  <rect x="180" y="258" width="30" height="24" rx="4" fill="none" stroke="#3f68a3" stroke-width="2.8"/>
  <line x1="185" y1="264" x2="205" y2="264" stroke="#3f68a3" stroke-width="2.2"/>
  <line x1="185" y1="270" x2="203" y2="270" stroke="#3f68a3" stroke-width="2.2"/>
  <text x="195" y="330" class="t1" text-anchor="middle">文档输入</text>
  <text x="195" y="364" class="t2" text-anchor="middle">拖拽 / 选择文件</text>
  <rect x="85" y="392" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="195" y="417" class="chip" text-anchor="middle">作业指导书 / 图纸 / 说明文档</text>
  <rect x="85" y="440" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="195" y="465" class="chip" text-anchor="middle">本地文件校验</text>
  <rect x="85" y="488" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="195" y="513" class="chip" text-anchor="middle">触发生成请求</text>

  <circle cx="505" cy="270" r="30" fill="#fff" stroke="#58bc8a" stroke-width="3"/>
  <path d="M490 274 L500 284 L520 260" fill="none" stroke="#2a9665" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="505" y="330" class="t1" text-anchor="middle">智能处理</text>
  <text x="505" y="364" class="t2" text-anchor="middle">AI 文档引擎</text>
  <rect x="395" y="392" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="505" y="417" class="chip" text-anchor="middle">上传文档文件</text>
  <rect x="395" y="440" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="505" y="465" class="chip" text-anchor="middle">触发解析流程</text>
  <rect x="395" y="488" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="505" y="513" class="chip" text-anchor="middle">返回结构化结果</text>

  <circle cx="815" cy="270" r="30" fill="#fff" stroke="#d6a33f" stroke-width="3"/>
  <path d="M801 286 C801 269 810 248 815 248 C820 248 829 269 829 286" fill="none" stroke="#ad791a" stroke-width="3.2"/>
  <circle cx="815" cy="275" r="6.5" fill="#ad791a"/>
  <text x="815" y="330" class="t1" text-anchor="middle">结构化解析</text>
  <text x="815" y="364" class="t2" text-anchor="middle">内容统一整理</text>
  <rect x="705" y="392" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="815" y="417" class="chip" text-anchor="middle">提取章节与要点</text>
  <rect x="705" y="440" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="815" y="465" class="chip" text-anchor="middle">梳理层级关系</text>
  <rect x="705" y="488" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="815" y="513" class="chip" text-anchor="middle">生成导图结构</text>

  <circle cx="1125" cy="270" r="30" fill="#fff" stroke="#8a91e7" stroke-width="3"/>
  <path d="M1110 286 L1110 258 L1140 258 L1140 286 M1110 272 L1140 272" fill="none" stroke="#5f67bf" stroke-width="3"/>
  <text x="1125" y="330" class="t1" text-anchor="middle">画面编排</text>
  <text x="1125" y="364" class="t2" text-anchor="middle">自动生成导图布局</text>
  <rect x="1015" y="392" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="1125" y="417" class="chip" text-anchor="middle">自动排布节点位置</text>
  <rect x="1015" y="440" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="1125" y="465" class="chip" text-anchor="middle">自动连接上下关系</text>
  <rect x="1015" y="488" width="220" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="1125" y="513" class="chip" text-anchor="middle">支持折叠/展开重排</text>

  <circle cx="1420" cy="270" r="30" fill="#fff" stroke="#ed8b8b" stroke-width="3"/>
  <path d="M1406 286 L1416 274 L1426 281 L1436 263" fill="none" stroke="#c95b5b" stroke-width="3.4" stroke-linecap="round"/>
  <text x="1420" y="330" class="t1" text-anchor="middle">可视交互</text>
  <text x="1420" y="364" class="t2" text-anchor="middle">导图操作界面</text>
  <rect x="1320" y="392" width="200" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="1420" y="417" class="chip" text-anchor="middle">缩放 / 平移 / 聚焦</text>
  <rect x="1320" y="440" width="200" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="1420" y="465" class="chip" text-anchor="middle">节点高亮与导航</text>
  <rect x="1320" y="488" width="200" height="38" rx="19" fill="#fff" opacity="0.92"/>
  <text x="1420" y="513" class="chip" text-anchor="middle">导出结构文件</text>

  <line x1="330" y1="360" x2="370" y2="360" stroke="#3f4f6a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="360" x2="680" y2="360" stroke="#3f4f6a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="950" y1="360" x2="990" y2="360" stroke="#3f4f6a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1260" y1="360" x2="1300" y2="360" stroke="#3f4f6a" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="320" y="650" width="960" height="150" rx="24" fill="#ffffff" stroke="#9fb2cb" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="800" y="705" class="tag" text-anchor="middle">过程留痕与追溯：保留生成记录，支持问题复盘与过程审计</text>
  <text x="800" y="748" class="chip" text-anchor="middle">文档 AI 运行日志（按日期归档）</text>

  <path d="M1420 570 C1420 620 1310 640 1180 640" fill="none" stroke="#6b7f9f" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
</svg>
