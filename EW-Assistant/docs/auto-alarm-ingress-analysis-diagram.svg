<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f9ff"/>
      <stop offset="100%" stop-color="#ecf2ff"/>
    </linearGradient>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9f2ff"/>
      <stop offset="100%" stop-color="#dbe9ff"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfbf4"/>
      <stop offset="100%" stop-color="#dbf6e9"/>
    </linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#ffefcc"/>
    </linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f2ff"/>
      <stop offset="100%" stop-color="#e3e6ff"/>
    </linearGradient>
    <linearGradient id="c5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f1"/>
      <stop offset="100%" stop-color="#ffe3e3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#263550" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#3e4d67"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 42px; font-weight: 800; fill: #17253a; }
      .sub { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 21px; font-weight: 500; fill: #4a5d79; }
      .h1 { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 31px; font-weight: 800; fill: #11233a; }
      .h2 { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 21px; font-weight: 600; fill: #334a64; }
      .chip { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 19px; font-weight: 600; fill: #233750; }
      .tag { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; font-size: 24px; font-weight: 700; fill: #263b58; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="84" class="title" text-anchor="middle">AUTO 报警自动接入分析模块示意</text>
  <text x="800" y="124" class="sub" text-anchor="middle">外部报警触发后，系统自动受理，先读取现场 IO 状态再进入 AI 分析，结果自动回到助手界面并留档</text>

  <rect x="45" y="210" width="280" height="380" rx="28" fill="url(#c1)" stroke="#8bb2e8" stroke-width="3" filter="url(#shadow)"/>
  <rect x="350" y="210" width="280" height="380" rx="28" fill="url(#c2)" stroke="#58bd8b" stroke-width="3" filter="url(#shadow)"/>
  <rect x="655" y="210" width="280" height="380" rx="28" fill="url(#c3)" stroke="#dfb24d" stroke-width="3" filter="url(#shadow)"/>
  <rect x="960" y="210" width="280" height="380" rx="28" fill="url(#c4)" stroke="#8b91e6" stroke-width="3" filter="url(#shadow)"/>
  <rect x="1265" y="210" width="290" height="380" rx="28" fill="url(#c5)" stroke="#ed8d8d" stroke-width="3" filter="url(#shadow)"/>

  <circle cx="185" cy="272" r="30" fill="#fff" stroke="#8bb2e8" stroke-width="3"/>
  <path d="M171 286 L171 258 L199 258 L199 286 M171 272 L199 272" fill="none" stroke="#426fae" stroke-width="3"/>
  <text x="185" y="334" class="h1" text-anchor="middle">报警触发源</text>
  <text x="185" y="368" class="h2" text-anchor="middle">上位机 / 产线系统</text>
  <rect x="73" y="396" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="185" y="423" class="chip" text-anchor="middle">报警编号</text>
  <rect x="73" y="446" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="185" y="473" class="chip" text-anchor="middle">报警内容 + 机台编号</text>
  <rect x="73" y="496" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="185" y="523" class="chip" text-anchor="middle">分析策略参数</text>

  <circle cx="490" cy="272" r="30" fill="#fff" stroke="#58bd8b" stroke-width="3"/>
  <path d="M476 274 L486 284 L506 261" fill="none" stroke="#2e9b6a" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="490" y="334" class="h1" text-anchor="middle">本地接入网关</text>
  <text x="490" y="368" class="h2" text-anchor="middle">本地自动受理服务</text>
  <rect x="378" y="396" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="490" y="423" class="chip" text-anchor="middle">本地自动接入通道</text>
  <rect x="378" y="446" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="490" y="473" class="chip" text-anchor="middle">立即返回受理结果</text>
  <rect x="378" y="496" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="490" y="523" class="chip" text-anchor="middle">自动进入分析流程</text>

  <circle cx="795" cy="272" r="30" fill="#fff" stroke="#dfb24d" stroke-width="3"/>
  <path d="M781 284 L809 284 M781 274 L809 274 M781 264 L809 264" stroke="#a9761b" stroke-width="3.2" stroke-linecap="round"/>
  <text x="795" y="334" class="h1" text-anchor="middle">AUTO 执行引擎</text>
  <text x="795" y="368" class="h2" text-anchor="middle">自动分析调度 + IO 读取</text>
  <rect x="683" y="396" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="795" y="423" class="chip" text-anchor="middle">单通道闸门（一次一条）</text>
  <rect x="683" y="446" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="795" y="473" class="chip" text-anchor="middle">后台异步启动分析</text>
  <rect x="683" y="496" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="795" y="523" class="chip" text-anchor="middle">自动触发现场 IO 读取</text>

  <circle cx="1100" cy="272" r="30" fill="#fff" stroke="#8b91e6" stroke-width="3"/>
  <path d="M1086 286 C1086 270 1095 248 1100 248 C1105 248 1114 270 1114 286" fill="none" stroke="#6168bf" stroke-width="3.2"/>
  <circle cx="1100" cy="275" r="6.3" fill="#6168bf"/>
  <text x="1100" y="334" class="h1" text-anchor="middle">AI 流式分析</text>
  <text x="1100" y="368" class="h2" text-anchor="middle">AI 分析服务</text>
  <rect x="988" y="396" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="1100" y="423" class="chip" text-anchor="middle">分析过程持续回传</text>
  <rect x="988" y="446" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="1100" y="473" class="chip" text-anchor="middle">结合 IO 读数给出判断</text>
  <rect x="988" y="496" width="224" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="1100" y="523" class="chip" text-anchor="middle">输出最终分析结果</text>

  <circle cx="1410" cy="272" r="30" fill="#fff" stroke="#ed8d8d" stroke-width="3"/>
  <path d="M1396 286 L1406 274 L1416 281 L1426 263" fill="none" stroke="#cb5e5e" stroke-width="3.4" stroke-linecap="round"/>
  <text x="1410" y="334" class="h1" text-anchor="middle">结果闭环</text>
  <text x="1410" y="368" class="h2" text-anchor="middle">展示 + 留痕</text>
  <rect x="1294" y="396" width="232" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="1410" y="423" class="chip" text-anchor="middle">AI 助手展示最终分析</text>
  <rect x="1294" y="446" width="232" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="1410" y="473" class="chip" text-anchor="middle">信息流显示触发/完成状态</text>
  <rect x="1294" y="496" width="232" height="40" rx="20" fill="#fff" opacity="0.92"/>
  <text x="1410" y="523" class="chip" text-anchor="middle">分析日志按天归档</text>

  <line x1="325" y1="362" x2="350" y2="362" stroke="#3e4d67" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="630" y1="362" x2="655" y2="362" stroke="#3e4d67" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="935" y1="362" x2="960" y2="362" stroke="#3e4d67" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1240" y1="362" x2="1265" y2="362" stroke="#3e4d67" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="275" y="662" width="1060" height="150" rx="25" fill="#fff" stroke="#9fb2cc" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="805" y="717" class="tag" text-anchor="middle">价值结果：报警自动接入、结合现场 IO 自动分析、结果自动回流，减少人工响应延迟</text>
  <text x="805" y="760" class="chip" text-anchor="middle">分析与处理日志按日期归档保存，支持后续追溯</text>

  <path d="M1410 590 C1410 640 1325 652 1215 652" fill="none" stroke="#6a809f" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
</svg>
