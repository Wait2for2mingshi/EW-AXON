<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">工位状态识别说明图</title>
  <desc id="desc">展示工业工位状态识别如何从现场画面与界面信息中识别状态，并联动预警、看板和自动化执行。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf1"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="right1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf4ff"/>
      <stop offset="100%" stop-color="#d9eaff"/>
    </linearGradient>
    <linearGradient id="right2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edfdf6"/>
      <stop offset="100%" stop-color="#daf6e8"/>
    </linearGradient>
    <linearGradient id="right3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7e9"/>
      <stop offset="100%" stop-color="#ffefcd"/>
    </linearGradient>
    <linearGradient id="right4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f3"/>
      <stop offset="100%" stop-color="#ffe2e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#32455f" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#5e728c"/>
    </marker>
    <style>
      .title { font: 800 46px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; fill: #16243c; }
      .sub { font: 500 22px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; fill: #52657f; }
      .panelTitle { font: 800 30px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; fill: #16243c; }
      .panelText { font: 600 20px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; fill: #38516e; }
      .tag { font: 700 18px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; }
      .chip { font: 700 20px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; }
      .cardNum { font: 800 20px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .cardTitle { font: 800 27px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; fill: #16243c; }
      .cardText { font: 600 19px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; fill: #3a526d; }
      .footerTitle { font: 800 28px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; fill: #1a2e48; }
      .footerText { font: 600 20px "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; fill: #52657f; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="86" class="title" text-anchor="middle">工位状态识别</text>
  <text x="800" y="126" class="sub" text-anchor="middle">从现场画面、OCR 文字、HMI 控件与时序数据中判断工位当前状态，并联动预警与看板</text>

  <g filter="url(#shadow)">
    <rect x="60" y="190" width="660" height="470" rx="30" fill="url(#panel)" stroke="#a8bfd7" stroke-width="3"/>
    <text x="100" y="250" class="panelTitle">可识别的工位现场</text>
    <text x="100" y="292" class="panelText">把相机图、桌面截图、指示灯、报警框和操作界面放在同一观察视角里</text>

    <rect x="100" y="330" width="400" height="240" rx="24" fill="#edf4ff" stroke="#9ebae1" stroke-width="2.5"/>
    <rect x="122" y="354" width="356" height="158" rx="16" fill="#d6e6ff"/>
    <rect x="150" y="384" width="112" height="76" rx="12" fill="#f5f9ff" stroke="#93afd5" stroke-width="2"/>
    <rect x="280" y="384" width="168" height="36" rx="10" fill="#f5f9ff" stroke="#93afd5" stroke-width="2"/>
    <rect x="280" y="432" width="168" height="36" rx="10" fill="#fff4e7" stroke="#e0b36a" stroke-width="2"/>
    <circle cx="175" cy="500" r="14" fill="#dc5a5a"/>
    <circle cx="215" cy="500" r="14" fill="#f0b63a"/>
    <circle cx="255" cy="500" r="14" fill="#43b581"/>
    <text x="182" y="548" class="panelText">相机 / 截图 / HMI / 指示灯</text>

    <rect x="530" y="340" width="150" height="58" rx="20" fill="#ffe6eb"/>
    <text x="605" y="377" class="tag" text-anchor="middle" fill="#b95268">报警弹窗</text>
    <rect x="530" y="415" width="150" height="58" rx="20" fill="#fff0d8"/>
    <text x="605" y="452" class="tag" text-anchor="middle" fill="#a67918">待确认按钮</text>
    <rect x="530" y="490" width="150" height="58" rx="20" fill="#e4f8ee"/>
    <text x="605" y="527" class="tag" text-anchor="middle" fill="#247a56">运行指示灯</text>

    <rect x="100" y="596" width="108" height="38" rx="19" fill="#e8f1ff"/>
    <text x="154" y="621" class="tag" text-anchor="middle" fill="#2f6fe4">运行中</text>
    <rect x="222" y="596" width="108" height="38" rx="19" fill="#fff0d8"/>
    <text x="276" y="621" class="tag" text-anchor="middle" fill="#a67918">待料</text>
    <rect x="344" y="596" width="108" height="38" rx="19" fill="#ffe7ea"/>
    <text x="398" y="621" class="tag" text-anchor="middle" fill="#c6546c">报警停机</text>
    <rect x="466" y="596" width="108" height="38" rx="19" fill="#e8f7ee"/>
    <text x="520" y="621" class="tag" text-anchor="middle" fill="#267d58">门未关</text>
    <rect x="588" y="596" width="92" height="38" rx="19" fill="#efeaff"/>
    <text x="634" y="621" class="tag" text-anchor="middle" fill="#6f61cb">卡料</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="790" y="190" width="330" height="200" rx="28" fill="url(#right1)" stroke="#8db6ea" stroke-width="3"/>
    <circle cx="832" cy="230" r="20" fill="#2f6fe4"/>
    <text x="832" y="237" class="cardNum" text-anchor="middle">1</text>
    <text x="822" y="286" class="cardTitle">状态采集</text>
    <text x="822" y="326" class="cardText">采集截图、OCR、控件树</text>
    <text x="822" y="358" class="cardText">同步最近报警与节拍数据</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1160" y="190" width="330" height="200" rx="28" fill="url(#right2)" stroke="#74c6a2" stroke-width="3"/>
    <circle cx="1202" cy="230" r="20" fill="#20a676"/>
    <text x="1202" y="237" class="cardNum" text-anchor="middle">2</text>
    <text x="1192" y="286" class="cardTitle">状态识别</text>
    <text x="1192" y="326" class="cardText">识别缺料、卡料、待机、报警</text>
    <text x="1192" y="358" class="cardText">输出状态名称与置信度</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="790" y="430" width="330" height="200" rx="28" fill="url(#right3)" stroke="#e1b45c" stroke-width="3"/>
    <circle cx="832" cy="470" r="20" fill="#d99a10"/>
    <text x="832" y="477" class="cardNum" text-anchor="middle">3</text>
    <text x="822" y="526" class="cardTitle">证据输出</text>
    <text x="822" y="566" class="cardText">给出关键区域、识别依据</text>
    <text x="822" y="598" class="cardText">便于人工快速确认</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1160" y="430" width="330" height="200" rx="28" fill="url(#right4)" stroke="#eb9bad" stroke-width="3"/>
    <circle cx="1202" cy="470" r="20" fill="#db5a76"/>
    <text x="1202" y="477" class="cardNum" text-anchor="middle">4</text>
    <text x="1192" y="526" class="cardTitle">系统联动</text>
    <text x="1192" y="566" class="cardText">驱动预警、看板、报表和 UI 动作</text>
    <text x="1192" y="598" class="cardText">支持持续统计停滞时长</text>
  </g>

  <line x1="720" y1="290" x2="790" y2="290" stroke="#5e728c" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1120" y1="290" x2="1160" y2="290" stroke="#5e728c" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1325" y1="390" x2="1325" y2="430" stroke="#5e728c" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1160" y1="530" x2="1120" y2="530" stroke="#5e728c" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="750" y="660" width="780" height="120" rx="26" fill="#ffffff" stroke="#a8bfd7" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1140" y="714" class="footerTitle" text-anchor="middle">价值结果：自动识别工位是否在运行、等待、报警或卡滞</text>
  <text x="1140" y="752" class="footerTitle" text-anchor="middle">补足过去只能靠人工盯屏的空白</text>
  </svg>
